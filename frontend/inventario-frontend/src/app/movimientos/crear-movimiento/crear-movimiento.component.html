<div class="form-container">

  <div class="form-title">
    {{ tipo === 'ENTRADA' ? 'Registrar entrada de stock' : 'Registrar salida de stock' }}
  </div>

  <form (ngSubmit)="guardar()">

    <!-- Producto -->
    <mat-form-field appearance="outline" style="width: 100%;">
      <mat-label>Producto</mat-label>
      <mat-select [(ngModel)]="movimiento.producto" name="producto" required>
        <mat-option *ngFor="let p of productos" [value]="{ id: p.id }">
          {{ p.nombre }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <!-- Cantidad -->
    <mat-form-field appearance="outline" style="width: 100%;">
      <mat-label>Cantidad</mat-label>
      <input matInput type="number" [(ngModel)]="movimiento.cantidad" name="cantidad" required>
    </mat-form-field>

    <!-- Nota -->
    <mat-form-field appearance="outline" style="width: 100%;">
      <mat-label>Nota (opcional)</mat-label>
      <input matInput [(ngModel)]="movimiento.nota" name="nota">
    </mat-form-field>

    <!-- Botones -->
    <div class="button-row">
      <button mat-stroked-button color="primary" type="button" routerLink="/movimientos">
        Cancelar
      </button>

      <button mat-flat-button color="primary" type="submit">
        Guardar movimiento
      </button>
    </div>

  </form>

</div>
