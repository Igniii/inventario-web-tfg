<h2>Categorías</h2>

<div style="margin-bottom: 15px;">
  <button mat-raised-button color="primary" (click)="irCrear()" *ngIf="auth.isAdmin()">
    Crear categoría
  </button>
</div>

<table mat-table [dataSource]="categorias" class="mat-elevation-z2">

  <!-- Nombre -->
  <ng-container matColumnDef="nombre">
    <th mat-header-cell *matHeaderCellDef> Nombre </th>
    <td mat-cell *matCellDef="let c"> {{ c.nombre }} </td>
  </ng-container>

  <!-- Acciones -->
  <ng-container matColumnDef="acciones">

    <th mat-header-cell *matHeaderCellDef>
      <ng-container *ngIf="auth.isAdmin()">Acciones</ng-container>
    </th>

    <td mat-cell *matCellDef="let c">
      <ng-container *ngIf="auth.isAdmin()">
        <button mat-stroked-button color="primary" (click)="editar(c.id!)">Editar</button>
        <button mat-stroked-button color="warn" (click)="eliminar(c.id!)">Eliminar</button>
      </ng-container>
    </td>

  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>
