<div class="form-container">

  <div class="form-title">Editar proveedor</div>

  <form (ngSubmit)="guardar()">

    <!-- Nombre -->
    <mat-form-field appearance="outline" style="width: 100%;">
      <mat-label>Nombre</mat-label>
      <input matInput [(ngModel)]="proveedor.nombre" name="nombre" required>
    </mat-form-field>

    <!-- Contacto -->
    <mat-form-field appearance="outline" style="width: 100%;">
      <mat-label>Contacto</mat-label>
      <input matInput [(ngModel)]="proveedor.contacto" name="contacto" required>
    </mat-form-field>

    <div class="button-row">
      <button mat-stroked-button type="button" color="primary" (click)="volver()">
        Cancelar
      </button>

      <button mat-flat-button color="primary" type="submit">
        Guardar cambios
      </button>
    </div>

  </form>

</div>
