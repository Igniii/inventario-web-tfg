<h2>Proveedores</h2>

<div style="margin-bottom: 15px;">
  <button mat-raised-button color="primary"
          routerLink="/proveedores/crear"
          *ngIf="auth.isAdmin()">
    Crear proveedor
  </button>
</div>

<table mat-table [dataSource]="proveedores" class="mat-elevation-z2">

  <!-- Nombre -->
  <ng-container matColumnDef="nombre">
    <th mat-header-cell *matHeaderCellDef> Nombre </th>
    <td mat-cell *matCellDef="let p"> {{ p.nombre }} </td>
  </ng-container>

  <!-- Contacto -->
  <ng-container matColumnDef="contacto">
    <th mat-header-cell *matHeaderCellDef> Contacto </th>
    <td mat-cell *matCellDef="let p"> {{ p.contacto }} </td>
  </ng-container>

  <!-- Acciones -->
  <ng-container matColumnDef="acciones">

    <th mat-header-cell *matHeaderCellDef>
      <ng-container *ngIf="auth.isAdmin()">Acciones</ng-container>
    </th>

    <td mat-cell *matCellDef="let p">
      <ng-container *ngIf="auth.isAdmin()">
        <button mat-stroked-button color="primary" (click)="editar(p.id!)">
          Editar
        </button>

        <button mat-stroked-button color="warn" (click)="eliminar(p.id!)">
          Eliminar
        </button>
      </ng-container>
    </td>

  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>
