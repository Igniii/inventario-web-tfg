<mat-toolbar color="primary" style="padding: 0 16px;">

  <!-- LOGO -->
  <img
    src="logo.png"
    alt="Logo"
    routerLink="/"
    style="height: 40px; width: auto; object-fit: contain; cursor: pointer; margin-right: 16px;"
  />

  <!-- Inicio -->
  <button mat-button routerLink="/">Inicio</button>

  <!-- Inventario -->
  <button *ngIf="isLoggedIn()" mat-button routerLink="/productos">
    Inventario
  </button>

  <!-- Herramientas -->
  <button
    *ngIf="isLoggedIn()"
    mat-button
    [matMenuTriggerFor]="menuHerramientas">
    Herramientas
    <mat-icon>arrow_drop_down</mat-icon>
  </button>

  <mat-menu #menuHerramientas="matMenu">
    <button mat-menu-item routerLink="/categorias">
      <mat-icon>category</mat-icon>
      <span>Categorías</span>
    </button>

    <button mat-menu-item routerLink="/proveedores">
      <mat-icon>store</mat-icon>
      <span>Proveedores</span>
    </button>

    <button mat-menu-item routerLink="/movimientos">
      <mat-icon>swap_vert</mat-icon>
      <span>Movimientos stock</span>
    </button>
  </mat-menu>

  <!-- Admin panel -->
  <button
    *ngIf="auth.isAdmin()"
    mat-button
    routerLink="/admin-panel"
    color="warn">
    Panel de administrador
  </button>

  <!-- Espacio hacia la derecha -->
  <span style="flex: 1 1 auto;"></span>

  <!-- USUARIO LOGADO (con menú) -->
  <ng-container *ngIf="usernameValue; else noSesion">

    <!-- Botón estilo avatar/usuario -->
    <button
      mat-button
      [matMenuTriggerFor]="menuUsuario"
      style="text-transform: none; font-weight: 500;">
      <mat-icon>account_circle</mat-icon>
      {{ usernameValue }}
      <mat-icon>arrow_drop_down</mat-icon>
    </button>

    <mat-menu #menuUsuario="matMenu">
      <!--
       1/12/2025 Si me da tiempo, implementaré un componente de página de perfil de usuario,
       de momento lo dejo comentado
       <button mat-menu-item routerLink="/perfil">
       <mat-icon>person</mat-icon>
       Perfil
     </button>  -->

     <button mat-menu-item (click)="logout()">
       <mat-icon>logout</mat-icon>
       Cerrar sesión
     </button>
   </mat-menu>

 </ng-container>

 <!-- NO LOGADO -->
  <ng-template #noSesion>
    <button mat-button routerLink="/login">
      Iniciar sesión
    </button>
    <button mat-button routerLink="/register">
      Registrarse
    </button>
  </ng-template>

</mat-toolbar>
<!-- Fin del archivo navbar.component.html -->
