<h2>Panel de administración de usuarios</h2>

<!-- Crear usuario -->
<div class="form-container">
  <div class="form-title">Crear usuario</div>

  <mat-form-field appearance="outline" style="width: 100%;">
    <mat-label>Nombre de usuario</mat-label>
    <input matInput [(ngModel)]="nuevoUsuario.username">
  </mat-form-field>

  <mat-form-field appearance="outline" style="width: 100%;">
    <mat-label>Contraseña</mat-label>
    <input matInput type="password" [(ngModel)]="nuevoUsuario.password">
  </mat-form-field>

  <mat-form-field appearance="outline" style="width: 100%;">
    <mat-label>Rol</mat-label>
    <select matNativeControl [(ngModel)]="nuevoUsuario.role">
      <option value="USER">USUARIO</option>
      <option value="ADMIN">GESTOR</option>
    </select>
  </mat-form-field>

  <button mat-flat-button color="primary" (click)="crearUsuario()">
    Crear usuario
  </button>
</div>

<br><br>

<!-- Tabla de usuarios -->
<table mat-table [dataSource]="usuarios" class="mat-elevation-z8" style="width: 100%;">

  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>ID</th>
    <td mat-cell *matCellDef="let u">{{ u.id }}</td>
  </ng-container>

  <ng-container matColumnDef="username">
    <th mat-header-cell *matHeaderCellDef>Usuario</th>
    <td mat-cell *matCellDef="let u">
      <input matInput [(ngModel)]="u.username" style="width: 150px;">
      <button mat-button color="primary" (click)="cambiarNombre(u.id, u.username)">Guardar</button>
    </td>
  </ng-container>

  <ng-container matColumnDef="role">
    <th mat-header-cell *matHeaderCellDef>Rol</th>
    <td mat-cell *matCellDef="let u">{{ u.role }}</td>
  </ng-container>

  <ng-container matColumnDef="acciones">
    <th mat-header-cell *matHeaderCellDef>Acciones</th>
    <td mat-cell *matCellDef="let u">
      <button mat-button color="accent" (click)="cambiarPasswordUI(u.id)">
        Cambiar contraseña
      </button>


      <button
        mat-button
        color="warn"
        *ngIf="u.username !== currentUser"
        (click)="eliminar(u.id)">
        Eliminar
      </button>

    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>
