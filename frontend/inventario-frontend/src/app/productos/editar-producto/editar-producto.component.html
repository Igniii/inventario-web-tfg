<h2>Editar producto</h2>

<form (ngSubmit)="guardar()">

  <label>Nombre:</label>
  <input type="text" [(ngModel)]="producto.nombre" name="nombre" required />

  <label>Descripción:</label>
  <input type="text" [(ngModel)]="producto.descripcion" name="descripcion" />

  <label>Stock:</label>
  <input type="number" [(ngModel)]="producto.stock" name="stock" required />

  <label>Precio:</label>
  <input type="number" step="0.01" [(ngModel)]="producto.precio"
         name="precio" required />

  <label>Categoría:</label>
  <select [(ngModel)]="categoriaId" name="categoriaId">
    <option *ngFor="let c of categorias" [value]="c.id">
      {{ c.nombre }}
    </option>
  </select>

  <label>Proveedor:</label>
  <select [(ngModel)]="proveedorId" name="proveedorId">
    <option *ngFor="let p of proveedores" [value]="p.id">
      {{ p.nombre }}
    </option>
  </select>

  <button type="submit">Guardar cambios</button>

</form>
