<div class="form-container">

  <div class="form-title">Editar producto</div>

  <form (ngSubmit)="guardar()">

    <!-- Nombre -->
    <mat-form-field appearance="outline" style="width: 100%;">
      <mat-label>Nombre</mat-label>
      <input matInput [(ngModel)]="producto.nombre" name="nombre" required>
    </mat-form-field>

    <!-- Descripción -->
    <mat-form-field appearance="outline" style="width: 100%;">
      <mat-label>Descripción</mat-label>
      <input matInput [(ngModel)]="producto.descripcion" name="descripcion">
    </mat-form-field>

    <!-- Precio -->
    <mat-form-field appearance="outline" style="width: 100%;">
      <mat-label>Precio</mat-label>
      <input matInput type="number" step="0.01" [(ngModel)]="producto.precio" name="precio" required>
    </mat-form-field>

    <!-- Categoría -->
    <mat-form-field appearance="outline" style="width: 100%;">
      <mat-label>Categoría</mat-label>
      <mat-select [(ngModel)]="categoriaId" name="categoriaId">
        <mat-option *ngFor="let c of categorias" [value]="c.id">
          {{ c.nombre }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <!-- Proveedor -->
    <mat-form-field appearance="outline" style="width: 100%;">
      <mat-label>Proveedor</mat-label>
      <mat-select [(ngModel)]="proveedorId" name="proveedorId">
        <mat-option *ngFor="let p of proveedores" [value]="p.id">
          {{ p.nombre }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <div class="button-row">
      <button mat-stroked-button color="primary" type="button" (click)="volver()">Cancelar </button>
      <button mat-flat-button color="primary" type="submit">Guardar cambios </button>
    </div>

  </form>

</div>
